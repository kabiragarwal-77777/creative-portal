services:
  - type: web
    name: performance-marketing-auto
    runtime: node
    buildCommand: cd uploader && npm install
    startCommand: cd uploader && node server.js
    envVars:
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_APP_SECRET_PROOF
        sync: false
      - key: META_AD_ACCOUNT_ID
        sync: false
      - key: GOOGLE_APPS_SCRIPT_URL
        sync: false
