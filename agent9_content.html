<style>
#drawer-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:400;display:none;opacity:0;transition:opacity 0.3s ease; }
#drawer-overlay.is-open { display:block;opacity:1; }
#profile-drawer { position:fixed;right:0;top:0;width:420px;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:500;transform:translateX(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);overflow-y:auto;display:flex;flex-direction:column; }
#profile-drawer.is-open { transform:translateX(0); }
#drawer-header { padding:20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--surface);z-index:10; }
#drawer-competitor-info { display:flex;align-items:center; }
#drawer-color-dot { width:40px;height:40px;border-radius:50%;margin-right:12px;flex-shrink:0;background:var(--gold); }
#drawer-name { font-size:18px;font-weight:700;color:var(--text);line-height:1.2; }
#drawer-vertical-badge { font-size:11px;font-family:var(--font-mono);padding:2px 8px;border-radius:3px;display:inline-block;margin-top:3px;background:rgba(255,255,255,0.07);color:var(--muted);letter-spacing:0.04em;text-transform:uppercase; }
#drawer-header-actions { display:flex;align-items:center;gap:8px; }
#export-profile-btn { padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-family:var(--font-mono);transition:border-color 0.2s,color 0.2s;white-space:nowrap; }
#export-profile-btn:hover { border-color:var(--gold);color:var(--gold); }
#close-drawer-btn { width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:color 0.2s,border-color 0.2s; }
#close-drawer-btn:hover { color:var(--text);border-color:var(--text); }
#drawer-body { padding:20px;flex:1;display:flex;flex-direction:column;gap:20px; }
.drawer-section { display:flex;flex-direction:column;gap:10px; }
.drawer-section-title { font-size:11px;font-family:var(--font-mono);text-transform:uppercase;color:var(--muted);letter-spacing:0.08em; }
#drawer-stats-row { display:grid;grid-template-columns:repeat(3,1fr);gap:8px; }
.drawer-stat-card { background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;text-align:center; }
.drawer-stat-value { font-family:var(--font-mono);font-size:18px;font-weight:600;color:var(--text);line-height:1.2;margin-bottom:4px; }
.drawer-stat-label { font-size:10px;color:var(--muted);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.06em; }
#drawer-content-mix { display:flex;flex-direction:column;gap:10px; }
.drawer-chart-wrap { position:relative;width:200px;height:200px;margin:0 auto; }
.drawer-chart-center-label { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:10px;font-family:var(--font-mono);color:var(--muted);text-transform:uppercase;text-align:center;pointer-events:none;letter-spacing:0.06em;line-height:1.3; }
.drawer-chart-legend { display:flex;flex-wrap:wrap;gap:6px 12px;justify-content:center; }
.drawer-legend-item { display:flex;align-items:center;gap:5px;font-size:11px;font-family:var(--font-mono);color:var(--muted); }
.drawer-legend-dot { width:8px;height:8px;border-radius:50%;flex-shrink:0; }
.drawer-timeline-list { max-height:240px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent; }
.drawer-timeline-item { display:flex;align-items:center;gap:8px;font-size:12px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04); }
.drawer-timeline-item:last-child { border-bottom:none; }
.drawer-date-pill { font-family:var(--font-mono);font-size:10px;color:var(--muted);background:rgba(255,255,255,0.05);border-radius:3px;padding:2px 5px;white-space:nowrap;flex-shrink:0; }
.drawer-timeline-headline { flex:1;color:var(--text);font-size:12px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.drawer-status-chip { font-size:9px;font-family:var(--font-mono);padding:2px 6px;border-radius:3px;flex-shrink:0;text-transform:uppercase; }
.drawer-status-chip.active { background:rgba(56,217,169,0.15);color:var(--teal); }
.drawer-status-chip.inactive { background:rgba(255,255,255,0.05);color:var(--muted); }
.drawer-format-icon { font-size:13px;flex-shrink:0; }
.drawer-hooks-list { display:flex;flex-direction:column;gap:8px; }
.drawer-hook-item { display:flex;align-items:center;gap:10px; }
.drawer-hook-medal { font-size:14px;flex-shrink:0;width:20px;text-align:center; }
.drawer-hook-info { flex:1;display:flex;flex-direction:column;gap:4px; }
.drawer-hook-label { font-size:12px;color:var(--text);display:flex;justify-content:space-between;align-items:center; }
.drawer-hook-count { font-family:var(--font-mono);font-size:10px;color:var(--muted); }
.drawer-hook-bar-track { height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden; }
.drawer-hook-bar-fill { height:100%;background:var(--gold);border-radius:2px;transition:width 0.4s ease; }
.drawer-themes-row { display:flex;flex-wrap:wrap;gap:6px; }
.drawer-theme-tag { font-size:11px;font-family:var(--font-mono);padding:4px 10px;border-radius:20px;border:1px solid;text-transform:lowercase;cursor:default;transition:opacity 0.2s; }
.drawer-sgt-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:8px; }
.drawer-sgt-col { background:rgba(255,255,255,0.02);border-radius:6px;padding:12px; }
.drawer-sgt-header { font-size:11px;font-family:var(--font-mono);text-transform:uppercase;color:var(--muted);letter-spacing:0.06em;margin-bottom:8px; }
.drawer-sgt-list { list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:2px; }
.drawer-sgt-item { font-size:12px;line-height:1.6;padding:3px 0; }
.drawer-sgt-item::before { content:"• ";font-size:10px; }
.drawer-sgt-col.strengths .drawer-sgt-item { color:var(--teal); }
.drawer-sgt-col.gaps .drawer-sgt-item { color:var(--gold); }
.drawer-sgt-col.threats .drawer-sgt-item { color:var(--coral); }
#drawer-notes-field { width:100%;min-height:80px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;color:var(--text);font-family:var(--font-sans);font-size:13px;resize:vertical;box-sizing:border-box;transition:border-color 0.2s;outline:none;line-height:1.5; }
#drawer-notes-field:focus { border-color:var(--gold); }
#drawer-notes-field::placeholder { color:var(--muted); }
.drawer-empty { font-size:12px;color:var(--muted);font-family:var(--font-mono);text-align:center;padding:16px 0; }
@media (max-width:480px) { #profile-drawer { width:100vw; } }
</style>

<div id="drawer-overlay"></div>
<div id="profile-drawer">
  <div id="drawer-header">
    <div id="drawer-competitor-info">
      <div id="drawer-color-dot"></div>
      <div><div id="drawer-name"></div><div id="drawer-vertical-badge"></div></div>
    </div>
    <div id="drawer-header-actions">
      <button id="export-profile-btn">↗ Export</button>
      <button id="close-drawer-btn">✕</button>
    </div>
  </div>
  <div id="drawer-body">
    <div id="drawer-stats-row">
      <div class="drawer-stat-card"><div class="drawer-stat-value" id="stat-monthly-volume">—</div><div class="drawer-stat-label">Monthly Vol</div></div>
      <div class="drawer-stat-card"><div class="drawer-stat-value" id="stat-active-ads">—</div><div class="drawer-stat-label">Active Ads</div></div>
      <div class="drawer-stat-card"><div class="drawer-stat-value" id="stat-top-platform">—</div><div class="drawer-stat-label">Top Platform</div></div>
    </div>
    <div id="drawer-content-mix" class="drawer-section">
      <div class="drawer-section-title">Format Mix</div>
      <div class="drawer-chart-wrap"><canvas id="drawer-content-mix-chart" width="200" height="200"></canvas><div class="drawer-chart-center-label">Format<br>Mix</div></div>
      <div class="drawer-chart-legend" id="drawer-chart-legend"></div>
    </div>
    <div id="drawer-ad-timeline" class="drawer-section">
      <div class="drawer-section-title" id="drawer-ad-timeline-title">Ad History</div>
      <div class="drawer-timeline-list" id="drawer-timeline-list"></div>
    </div>
    <div id="drawer-top-hooks" class="drawer-section">
      <div class="drawer-section-title">Top Hook Styles</div>
      <div class="drawer-hooks-list" id="drawer-hooks-list"></div>
    </div>
    <div id="drawer-themes" class="drawer-section">
      <div class="drawer-section-title">Ad Themes</div>
      <div class="drawer-themes-row" id="drawer-themes-row"></div>
    </div>
    <div id="drawer-sgt" class="drawer-section">
      <div class="drawer-section-title">Intel Summary</div>
      <div class="drawer-sgt-grid">
        <div class="drawer-sgt-col strengths"><div class="drawer-sgt-header">Strengths ✅</div><ul class="drawer-sgt-list" id="drawer-strengths-list"></ul></div>
        <div class="drawer-sgt-col gaps"><div class="drawer-sgt-header">Gaps ⚠️</div><ul class="drawer-sgt-list" id="drawer-gaps-list"></ul></div>
        <div class="drawer-sgt-col threats"><div class="drawer-sgt-header">Threats ⚡</div><ul class="drawer-sgt-list" id="drawer-threats-list"></ul></div>
      </div>
    </div>
    <div id="drawer-notes" class="drawer-section">
      <div class="drawer-section-title">📝 Notes</div>
      <textarea id="drawer-notes-field" placeholder="Add your research notes..."></textarea>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';
  var _chartInstance=null, _currentCompetitorId=null;
  function getData(){return window.UNIVEST_DATA||{};}
  function getCompetitor(id){return (getData().competitors||[]).find(c=>String(c.id)===String(id))||null;}
  function getAdsForCompetitor(id){return (getData().ads||[]).filter(a=>String(a.competitorId)===String(id));}
  function formatDate(s){if(!s)return'—';try{return new Date(s).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'});}catch(e){return s;}}
  function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  const FORMAT_ICONS={video:'🎬',static:'🖼️',image:'🖼️',carousel:'🎠',story:'📱',default:'📄'};
  function getFormatIcon(f){return FORMAT_ICONS[(f||'').toLowerCase()]||FORMAT_ICONS.default;}
  const THEME_PALETTE=[
    {bg:'rgba(75,171,247,0.12)',border:'#4dabf7',text:'#4dabf7'},
    {bg:'rgba(240,180,41,0.12)',border:'#f0b429',text:'#f0b429'},
    {bg:'rgba(56,217,169,0.12)',border:'#38d9a9',text:'#38d9a9'},
    {bg:'rgba(255,107,107,0.12)',border:'#ff6b6b',text:'#ff6b6b'},
    {bg:'rgba(160,120,250,0.12)',border:'#a078fa',text:'#a078fa'},
  ];
  const CHART_COLORS=['#4dabf7','#f0b429','#38d9a9','#ff6b6b'];
  const CHART_FORMATS=['Video','Static','Carousel','Story'];
  function buildFormatCounts(ads){
    const c={video:0,static:0,carousel:0,story:0};
    ads.forEach(a=>{const f=(a.format||'').toLowerCase();if(f==='video'||f==='reel')c.video++;else if(f==='static'||f==='image')c.static++;else if(f==='carousel')c.carousel++;else if(f==='story')c.story++;else c.static++;});
    return [c.video,c.static,c.carousel,c.story];
  }
  function renderDonutChart(ads){
    const canvas=document.getElementById('drawer-content-mix-chart');
    if(!canvas||typeof Chart==='undefined') return;
    if(_chartInstance){_chartInstance.destroy();_chartInstance=null;}
    const fd=buildFormatCounts(ads), total=fd.reduce((s,v)=>s+v,0);
    _chartInstance=new Chart(canvas,{type:'doughnut',data:{labels:CHART_FORMATS,datasets:[{data:total>0?fd:[1,1,1,1],backgroundColor:CHART_COLORS.map(c=>c+'cc'),borderColor:CHART_COLORS,borderWidth:1.5,hoverOffset:4}]},options:{responsive:false,cutout:'68%',animation:{duration:400},plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{if(total===0) return ctx.label+': 0';return ctx.label+': '+Math.round((ctx.raw/total)*100)+'%';}},backgroundColor:'#13141a',borderColor:'#252630',borderWidth:1,titleColor:'#e8e9f0',bodyColor:'#7c7d8a',padding:8}}}});
    const legend=document.getElementById('drawer-chart-legend');
    if(legend){legend.innerHTML='';CHART_FORMATS.forEach((lbl,i)=>{const pct=total>0?Math.round((fd[i]/total)*100):0;const item=document.createElement('div');item.className='drawer-legend-item';item.innerHTML=`<span class="drawer-legend-dot" style="background:${CHART_COLORS[i]}"></span><span>${lbl} ${pct}%</span>`;legend.appendChild(item);});}
  }
  function renderTimeline(ads){
    const title=document.getElementById('drawer-ad-timeline-title');
    const list=document.getElementById('drawer-timeline-list');
    if(!list) return;
    const sorted=ads.slice().sort((a,b)=>new Date(b.firstSeen||0)-new Date(a.firstSeen||0));
    if(title) title.textContent='Ad History ('+sorted.length+')';
    if(!sorted.length){list.innerHTML='<div class="drawer-empty">No ads recorded</div>';return;}
    list.innerHTML=sorted.map(ad=>{
      const sc=ad.isActive?'active':'inactive', sl=ad.isActive?'Active':'Inactive';
      return `<div class="drawer-timeline-item"><span class="drawer-date-pill">${formatDate(ad.firstSeen)}</span><span class="drawer-timeline-headline" title="${escHtml(ad.headline||'')}">${escHtml(ad.headline||'(no headline)')}</span><span class="drawer-status-chip ${sc}">${sl}</span><span class="drawer-format-icon">${getFormatIcon(ad.format)}</span></div>`;
    }).join('');
  }
  function renderTopHooks(ads){
    const list=document.getElementById('drawer-hooks-list');
    if(!list) return;
    const tally={};
    ads.forEach(a=>{const h=(a.hookStyle||'').trim();if(!h) return;tally[h]=(tally[h]||0)+1;});
    const entries=Object.keys(tally).map(k=>({style:k,count:tally[k]})).sort((a,b)=>b.count-a.count).slice(0,3);
    if(!entries.length){list.innerHTML='<div class="drawer-empty">No hook data</div>';return;}
    const MEDALS=['🥇','🥈','🥉'], maxC=entries[0].count;
    list.innerHTML=entries.map((item,i)=>{
      const pct=maxC>0?Math.round((item.count/maxC)*100):0;
      return `<div class="drawer-hook-item"><span class="drawer-hook-medal">${MEDALS[i]}</span><div class="drawer-hook-info"><div class="drawer-hook-label"><span>${escHtml(item.style)}</span><span class="drawer-hook-count">${item.count} ads</span></div><div class="drawer-hook-bar-track"><div class="drawer-hook-bar-fill" style="width:${pct}%"></div></div></div></div>`;
    }).join('');
  }
  function renderThemes(ads,comp){
    const row=document.getElementById('drawer-themes-row');
    if(!row) return;
    const themeSet={};
    if(comp&&comp.topTheme) themeSet[comp.topTheme]=true;
    ads.forEach(a=>{if(a.theme) themeSet[a.theme]=true;});
    const themes=Object.keys(themeSet).filter(Boolean);
    if(!themes.length){row.innerHTML='<div class="drawer-empty">No themes</div>';return;}
    row.innerHTML=themes.map((t,i)=>{const c=THEME_PALETTE[i%THEME_PALETTE.length];return `<span class="drawer-theme-tag" style="background:${c.bg};border-color:${c.border};color:${c.text}">${escHtml(t)}</span>`;}).join('');
  }
  function renderSGT(comp){
    const fillList=(id,items)=>{const el=document.getElementById(id);if(!el) return;el.innerHTML=(!items||!items.length)?'<li class="drawer-sgt-item" style="opacity:0.4">—</li>':items.map(item=>`<li class="drawer-sgt-item">${escHtml(item)}</li>`).join('');};
    fillList('drawer-strengths-list',comp.strengths);
    fillList('drawer-gaps-list',comp.gaps);
    fillList('drawer-threats-list',comp.threats);
  }
  function bindNoteSave(id){
    const field=document.getElementById('drawer-notes-field');
    if(!field) return;
    const newField=field.cloneNode(true);
    field.parentNode.replaceChild(newField,field);
    newField.value=localStorage.getItem('profile_notes_'+id)||'';
    newField.addEventListener('blur',()=>{localStorage.setItem('profile_notes_'+id,newField.value);});
  }
  function populateDrawer(id){
    const comp=getCompetitor(id), ads=getAdsForCompetitor(id);
    if(!comp){const n=document.getElementById('drawer-name');if(n) n.textContent='Unknown';return;}
    const dot=document.getElementById('drawer-color-dot');if(dot) dot.style.background=comp.color||'var(--gold)';
    const nameEl=document.getElementById('drawer-name');if(nameEl) nameEl.textContent=comp.name||'Unnamed';
    const badge=document.getElementById('drawer-vertical-badge');
    if(badge){badge.textContent=comp.vertical||'Unknown';badge.style.background=(comp.color||'var(--gold)')+'22';badge.style.color=comp.color||'var(--muted)';}
    const vol=document.getElementById('stat-monthly-volume');if(vol) vol.textContent=comp.monthlyVolume!=null?comp.monthlyVolume+'':'-';
    const adsEl=document.getElementById('stat-active-ads');if(adsEl) adsEl.textContent=comp.activeAds!=null?comp.activeAds:'—';
    const plat=document.getElementById('stat-top-platform');if(plat) plat.textContent=comp.topPlatform||'—';
    renderDonutChart(ads);
    renderTimeline(ads);
    renderTopHooks(ads);
    renderThemes(ads,comp);
    renderSGT(comp);
    bindNoteSave(id);
  }
  function openDrawer(){
    const ov=document.getElementById('drawer-overlay'), dr=document.getElementById('profile-drawer');
    if(ov) ov.classList.add('is-open'); if(dr) dr.classList.add('is-open');
    document.body.style.overflow='hidden';
  }
  function closeDrawer(){
    const ov=document.getElementById('drawer-overlay'), dr=document.getElementById('profile-drawer');
    if(ov) ov.classList.remove('is-open'); if(dr) dr.classList.remove('is-open');
    document.body.style.overflow='';
    _currentCompetitorId=null;
  }
  window.openCompetitorDrawer=function(id){
    if(!id) return;
    _currentCompetitorId=String(id);
    try{sessionStorage.setItem('last_drawer_competitor',_currentCompetitorId);}catch(e){}
    window.LAST_DRAWER_COMPETITOR=_currentCompetitorId;
    populateDrawer(_currentCompetitorId);
    openDrawer();
  };
  const overlay=document.getElementById('drawer-overlay');
  if(overlay) overlay.addEventListener('click',closeDrawer);
  const closeBtn=document.getElementById('close-drawer-btn');
  if(closeBtn) closeBtn.addEventListener('click',closeDrawer);
  const exportBtn=document.getElementById('export-profile-btn');
  if(exportBtn) exportBtn.addEventListener('click',()=>{if(_currentCompetitorId) exportProfile(_currentCompetitorId);});
  document.addEventListener('keydown',e=>{if(e.key==='Escape') closeDrawer();});
  document.addEventListener('click',e=>{const el=e.target.closest('[data-competitor-id]');if(el&&el.dataset.competitorId) window.openCompetitorDrawer(el.dataset.competitorId);});
  function exportProfile(id){
    const comp=getCompetitor(id);if(!comp) return;
    const ads=getAdsForCompetitor(id);
    const notes=localStorage.getItem('profile_notes_'+id)||'';
    const tally={};ads.forEach(a=>{const h=(a.hookStyle||'').trim();if(!h) return;tally[h]=(tally[h]||0)+1;});
    const topHooks=Object.keys(tally).map(k=>({style:k,count:tally[k]})).sort((a,b)=>b.count-a.count).slice(0,3);
    const themeSet={};if(comp.topTheme) themeSet[comp.topTheme]=true;ads.forEach(a=>{if(a.theme) themeSet[a.theme]=true;});
    const themes=Object.keys(themeSet);
    const MEDALS=['🥇','🥈','🥉'];
    const dateStr=new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'});
    let html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Profile: ${escHtml(comp.name)}</title><style>body{font-family:sans-serif;padding:32px;max-width:780px;margin:0 auto;color:#111}h1{font-size:24px;margin-bottom:4px}.badge{display:inline-block;font-size:11px;font-family:monospace;padding:2px 8px;border-radius:3px;background:#eee;margin-bottom:20px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}.stat{border:1px solid #ddd;border-radius:6px;padding:12px;text-align:center}.stat-val{font-family:monospace;font-size:22px;font-weight:bold}.stat-lbl{font-size:10px;text-transform:uppercase;color:#666;margin-top:4px}h2{font-size:13px;text-transform:uppercase;letter-spacing:0.08em;color:#555;border-bottom:1px solid #eee;padding-bottom:4px;margin:20px 0 10px}.sgt{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.sgt-col{border:1px solid #eee;border-radius:6px;padding:12px}.sgt-head{font-size:11px;font-family:monospace;text-transform:uppercase;color:#888;margin-bottom:8px}.sgt-item{font-size:12px;line-height:1.6}.sgt-item::before{content:"• "}.s .sgt-item{color:#1a9e7a}.g .sgt-item{color:#b07d00}.t .sgt-item{color:#c0392b}.notes{white-space:pre-wrap;font-size:13px;background:#f8f8f8;border:1px solid #ddd;border-radius:6px;padding:12px}.footer{margin-top:32px;font-size:11px;color:#aaa;border-top:1px solid #eee;padding-top:12px}@media print{body{padding:0}}</style></head><body>`;
    html+=`<h1>${escHtml(comp.name)}</h1><span class="badge">${escHtml(comp.vertical||'Unknown')}</span>`;
    html+=`<div class="stats"><div class="stat"><div class="stat-val">${comp.monthlyVolume||'—'}</div><div class="stat-lbl">Monthly Volume</div></div><div class="stat"><div class="stat-val">${comp.activeAds||'—'}</div><div class="stat-lbl">Active Ads</div></div><div class="stat"><div class="stat-val">${escHtml(comp.topPlatform||'—')}</div><div class="stat-lbl">Top Platform</div></div></div>`;
    if(topHooks.length){html+=`<h2>Top Hooks</h2>`;const maxC=topHooks[0].count;topHooks.forEach((h,i)=>{html+=`<div style="display:flex;gap:10px;align-items:center;margin-bottom:6px"><span>${MEDALS[i]}</span><span style="flex:1;font-size:13px">${escHtml(h.style)}</span><span style="font-size:11px;color:#888">${h.count} ads</span></div>`;});}
    if(themes.length){html+=`<h2>Ad Themes</h2><div style="display:flex;flex-wrap:wrap;gap:6px">`;themes.forEach(t=>{html+=`<span style="font-size:11px;font-family:monospace;padding:3px 9px;border-radius:20px;border:1px solid #ccc;color:#555">${escHtml(t)}</span>`;});html+=`</div>`;}
    html+=`<h2>Intel Summary</h2><div class="sgt"><div class="sgt-col s"><div class="sgt-head">Strengths</div>`;(comp.strengths||[]).forEach(s=>{html+=`<div class="sgt-item">${escHtml(s)}</div>`;});html+=`</div><div class="sgt-col g"><div class="sgt-head">Gaps</div>`;(comp.gaps||[]).forEach(s=>{html+=`<div class="sgt-item">${escHtml(s)}</div>`;});html+=`</div><div class="sgt-col t"><div class="sgt-head">Threats</div>`;(comp.threats||[]).forEach(s=>{html+=`<div class="sgt-item">${escHtml(s)}</div>`;});html+=`</div></div>`;
    if(notes) html+=`<h2>Notes</h2><div class="notes">${escHtml(notes)}</div>`;
    html+=`<div class="footer">Generated ${dateStr} — Univest CI</div></body></html>`;
    const blob=new Blob([html],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const win=window.open(url,'_blank');
    if(win) win.addEventListener('load',()=>URL.revokeObjectURL(url));
  }
})();
</script>
