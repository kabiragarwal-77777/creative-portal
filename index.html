<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Marketing Auto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-body: #08080d;
            --bg-nav: #0f0f18;
            --bg-tab: #1a1a2e;
            --bg-active: #6c5ce7;
            --text: #e2e2e2;
            --text-muted: #888;
            --border: #2a2a3e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-nav {
            display: flex;
            align-items: center;
            gap: 0;
            background: var(--bg-nav);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 52px;
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-right: 32px;
        }

        .brand-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #6c5ce7, #00d4aa);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            color: #fff;
        }

        .brand-text {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text);
        }

        .brand-text span {
            color: var(--text-muted);
            font-weight: 400;
        }

        .tabs {
            display: flex;
            gap: 2px;
            height: 100%;
            align-items: flex-end;
        }

        .tab {
            padding: 10px 24px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            border: none;
            background: transparent;
            border-radius: 8px 8px 0 0;
            transition: all 0.2s;
            font-family: inherit;
            position: relative;
        }

        .tab:hover {
            color: var(--text);
            background: rgba(108, 92, 231, 0.1);
        }

        .tab.active {
            color: #fff;
            background: var(--bg-active);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--bg-active);
        }

        .tab-icon {
            margin-right: 6px;
        }

        .frame-container {
            flex: 1;
            position: relative;
        }

        .frame-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: var(--bg-body);
        }

        .frame-container iframe.hidden {
            visibility: hidden;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="brand">
            <div class="brand-icon">PM</div>
            <div class="brand-text">Performance Marketing <span>Auto</span></div>
        </div>
        <div class="tabs">
            <button class="tab active" data-tab="creative">
                <span class="tab-icon">&#9632;</span> Creative Portal
            </button>
            <button class="tab" data-tab="uploader">
                <span class="tab-icon">&#9650;</span> Meta Ad Upload
            </button>
        </div>
    </nav>
    <div class="frame-container">
        <iframe id="frame-creative" src="creative.html"></iframe>
        <iframe id="frame-uploader" src="uploader/upload.html?v=3" class="hidden"></iframe>
    </div>

    <script>
        const tabs = document.querySelectorAll('.tab');
        const frames = {
            creative: document.getElementById('frame-creative'),
            uploader: document.getElementById('frame-uploader'),
        };

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const target = tab.dataset.tab;
                Object.entries(frames).forEach(([key, frame]) => {
                    frame.classList.toggle('hidden', key !== target);
                });
            });
        });
    </script>
</body>
</html>
